<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taily — The Pet Lovers' Community</title>
    <meta name="description" content="Taily - Pet Operating Infrastructure and Community Platform. ค้นหาสถานที่ Pet-Friendly ทั่วไทย กิจกรรม และชุมชนคนรักสัตว์เลี้ยง">
    <meta name="theme-color" content="#FFC501">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23FFC501'/><text x='50' y='65' text-anchor='middle' font-size='40' font-weight='bold' fill='%233D2B1F'>🐾</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #FFC501;
            --primary-dark: #E5A800;
            --primary-on: #3D2B1F;
            --secondary: #3D2B1F;
            --accent: #FF8C42;
            --bg: #FFFBF0;
        }

        body {
            font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
        }

        .landing {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }

        .logo-container {
            margin-bottom: 32px;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(255, 197, 1, 0.3);
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-on);
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .tagline {
            font-size: 18px;
            color: #8B7355;
            margin-bottom: 48px;
            font-weight: 500;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 280px;
            justify-content: center;
        }

        .link-btn.app {
            background: var(--primary);
            color: var(--primary-on);
            box-shadow: 0 4px 16px rgba(255, 197, 1, 0.3);
        }

        .link-btn.app:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 197, 1, 0.4);
        }

        .link-btn.admin {
            background: var(--secondary);
            color: #FFF;
            box-shadow: 0 4px 16px rgba(61, 43, 31, 0.2);
        }

        .link-btn.admin:hover {
            background: #2A1D14;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(61, 43, 31, 0.3);
        }

        .link-btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 64px;
            font-size: 13px;
            color: #B8A88A;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .social {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 24px;
        }

        .social a {
            color: #8B7355;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .social a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            h1 { font-size: 36px; }
            .link-btn { width: 240px; font-size: 16px; padding: 14px 32px; }
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo-container">
            <div class="logo-circle">
                <svg width="70" height="70" viewBox="0 0 80 80">
                    <text x="11" y="52" font-family="Arial Black,Inter,sans-serif" font-size="22" font-weight="900" fill="#3D2B1F" letter-spacing="1">T</text>
                    <g transform="translate(24,28)">
                        <ellipse cx="6" cy="14" rx="6" ry="5" fill="#3D2B1F"/>
                        <circle cx="1" cy="6" r="2.5" fill="#3D2B1F"/>
                        <circle cx="6" cy="3.5" r="2.5" fill="#3D2B1F"/>
                        <circle cx="11" cy="6" r="2.5" fill="#3D2B1F"/>
                    </g>
                    <text x="38" y="52" font-family="Arial Black,Inter,sans-serif" font-size="22" font-weight="900" fill="#3D2B1F" letter-spacing="1">ILY</text>
                </svg>
            </div>
            <h1>TAILY</h1>
            <p class="tagline">The Pet Lovers' Community</p>
        </div>

        <div class="links">
            <a href="app/" class="link-btn app">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12" y2="18"/>
                </svg>
                📱 Mobile App
            </a>
            <a href="admin/" class="link-btn admin">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                🖥️ Admin Back Office
            </a>
        </div>

        <div class="footer">
            <p>© 2026 TAILY — ADVANCE NETWORK TECHNOLOGY & SERVICES CO., LTD.</p>
            <div class="social">
                <a href="https://instagram.com/taily_appofficial" target="_blank">Instagram</a>
                <a href="https://facebook.com/profile.php?id=61577161623419" target="_blank">Facebook</a>
                <a href="https://tiktok.com/@tailyapp" target="_blank">TikTok</a>
            </div>
        </div>
    </div>
</body>
</html>
